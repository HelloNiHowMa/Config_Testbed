---
# tasks/disable_nat_windows.yml
- name: "[Windows] 設定預設閘道與 DNS"
  ansible.windows.win_shell: |
    $adapter = Get-NetIPAddress -AddressFamily IPv4 | Where-Object { $_.IPAddress -like "10.0.0.*" }
    if ($adapter) {
        $idx = $adapter.InterfaceIndex
        # 設定 DNS
        Set-DnsClientServerAddress -InterfaceIndex $idx -ServerAddresses ("1.1.1.1")
        # 建立預設路由 (如果已存在會忽略報錯)
        New-NetRoute -InterfaceIndex $idx -DestinationPrefix "0.0.0.0/0" -NextHop "10.0.0.1" -ErrorAction SilentlyContinue
    }
    
- name: "[Windows] 尋找並停用 NAT 網卡"
  ansible.windows.win_shell: |
    $natAdapter = Get-NetIPAddress -AddressFamily IPv4 | Where-Object { $_.IPAddress -like "10.0.2.*" }
    if ($natAdapter) {
        $ifIndex = $natAdapter.InterfaceIndex
        Disable-NetAdapter -InterfaceIndex $ifIndex -Confirm:$false
        Write-Output "Disabled NAT Adapter with Index $ifIndex"
    } else {
        Write-Output "No NAT adapter found or already disabled."
    }
  register: win_nat_disable
  changed_when: "'Disabled' in win_nat_disable.stdout"
  ignore_errors: yes
